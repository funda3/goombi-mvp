services:
  - type: web
    name: goombi-api
    runtime: python
    rootDir: goombi-mvp/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: goombi-frontend
    runtime: static
    rootDir: goombi-mvp/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
